name: Beta Build
on:
  push:
    branches: [ 'release/beta' ]
    paths-ignore: [ '**.md' ]

jobs:
  unitTests:
    name: Unit Tests
    uses: ./.github/workflows/reusable-unitTests.yml
    secrets: inherit
    permissions:
      checks: write

  #  integrationTests:
  #    name: Integration Tests
  #    needs: unitTests
  #    uses: ./.github/workflows/reusable-integrationTests.yml
  #    secrets: inherit

  #  integrationTestsEAP:
  #    name: Integration Tests EAP
  #    uses: ./.github/workflows/reusable-integrationTests.yml
  #    secrets: inherit
  #    with:
  #      platformVersion: 222-EAP-SNAPSHOT

  pluginVerification:
    name: Plugin Verification
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v6.0.2

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: jetbrains
          java-version: 21
          cache: gradle
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Verify plugin
        run: ./gradlew verifyPlugin

  build:
    name: Build
    needs:
      - unitTests
      #      - integrationTests
      # - integrationTestsEAP
      - pluginVerification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.properties.outputs.version }}
      changelog: ${{ steps.properties.outputs.changelog }}
    steps:

      - name: Fetch Sources
        uses: actions/checkout@v6.0.2

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: jetbrains
          java-version: 21
          cache: gradle
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Set environment variables
      - name: Export Properties
        id: properties
        shell: bash
        run: |
          PROPERTIES="$(./gradlew properties --console=plain -q)"
          VERSION="$(echo "$PROPERTIES" | grep "^version:" | cut -f2- -d ' ')"
          NAME="$(echo "$PROPERTIES" | grep "^name:" | cut -f2- -d ' ')"
          ARTIFACT="$NAME-$VERSION.zip"
          CHANGELOG="$(./gradlew getChangelog --unreleased --no-header --console=plain -q)"
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "artifact=$ARTIFACT" >> $GITHUB_OUTPUT

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build Plugin
        run: ./gradlew buildPlugin -x test

      # Store an already-built plugin as an artifact for downloading
      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ steps.properties.outputs.artifact }}
          path: ./build/distributions/${{ steps.properties.outputs.artifact }}

  release:
    name: Publish Plugin
    runs-on: ubuntu-latest
    steps:

      - name: Fetch Sources
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      # Setup Java 21 environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: jetbrains
          java-version: 21
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0
        with:
          cache-read-only: true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Set environment variables
      - name: Export Properties
        id: properties
        shell: bash
        run: |
          CHANGELOG="$(cat << 'EOM' | sed -e 's/^[[:space:]]*$//g' -e '/./,$!d'
          ${{ github.event.release.body }}
          EOM
          )"
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Publish the plugin to the Marketplace
      - name: Publish Plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin
